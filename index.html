<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My First GitHub Website!</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #74ebe1 0%, #89a8fc 100%);
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .card {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 400px;
        }
        h1 {
            color: #4a00e0;
            margin-bottom: 10px;
        }
        p {
            font-size: 1.1rem;
            color: #666;
        }
        .btn {
            display: inline-block;
            margin-top: 15px;
            padding: 10px 20px;
            background: #4a00e0;
            color: white;
            text-decoration: none;
            border-radius: 25px;
            transition: 0.3s;
        }
        .btn:hover {
            background: #8e2de2;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>It Works! 🎉</h1>
        <p>Your website is officially live on GitHub Pages.</p>
        <a href="#" class="btn" onclick="alert('You clicked the test button!')">Click Me</a>
    </div>
</body>
</html>
